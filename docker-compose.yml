name: mlie-billing

services:
  db:
    image: postgres:16-alpine
    container_name: mlie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mlie
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: mlie
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlie -d mlie"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: ["pnpm", "db:migrate"]
    environment:
      DATABASE_URL: postgres://mlie:${POSTGRES_PASSWORD}@db:5432/mlie
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  web:
    build: .
    container_name: mlie-web
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://mlie:${POSTGRES_PASSWORD}@db:5432/mlie
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      QBO_CLIENT_ID: ${QBO_CLIENT_ID:-}
      QBO_CLIENT_SECRET: ${QBO_CLIENT_SECRET:-}
      QBO_REDIRECT_URI: ${QBO_REDIRECT_URI:-}
      QBO_ENVIRONMENT: ${QBO_ENVIRONMENT:-production}
      QBO_REALM_ID: ${QBO_REALM_ID:-}
      QBO_REFRESH_TOKEN: ${QBO_REFRESH_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Cloudflare Tunnel — no open ports needed, Cloudflare handles SSL.
  # In Cloudflare Zero Trust → Tunnels → create tunnel → add public hostname:
  #   billing.occupationaloctaves.com → HTTP → web:3000
  # Paste the tunnel token into .env as CLOUDFLARE_TUNNEL_TOKEN.
  # Run with: docker compose --profile tunnel up -d --build
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?set CLOUDFLARE_TUNNEL_TOKEN in .env}
    depends_on:
      - web

volumes:
  postgres_data: