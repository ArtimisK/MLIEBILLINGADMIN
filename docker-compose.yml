services:
  app:
    build: .
    container_name: mlie-billing
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://mlie:${POSTGRES_PASSWORD}@db:5432/mlie
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      QBO_CLIENT_ID: ${QBO_CLIENT_ID}
      QBO_CLIENT_SECRET: ${QBO_CLIENT_SECRET}
      QBO_REDIRECT_URI: ${QBO_REDIRECT_URI}
      QBO_ENVIRONMENT: ${QBO_ENVIRONMENT}
      QBO_REALM_ID: ${QBO_REALM_ID:-}
      QBO_REFRESH_TOKEN: ${QBO_REFRESH_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: mlie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mlie
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mlie
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlie"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: